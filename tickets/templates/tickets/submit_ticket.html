{% extends 'tickets/base.html' %}
{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <h2 style="margin-bottom:24px; color:#1B4F8A;">Submit New Ticket</h2>
  <div class="card">
    {% if success %}
      <div class="msg-success">✅ Ticket submitted! AI is classifying priority...</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div style="margin-bottom:16px;">
        <label style="display:block; margin-bottom:6px; font-weight:600;">Title</label>
        <input type="text" name="title" required placeholder="Brief summary of the issue"
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:block; margin-bottom:6px; font-weight:600;">Description</label>
        <textarea name="description" rows="5" required placeholder="Describe the issue in detail..."
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; resize:vertical;"></textarea>
      </div>
      <button type="submit" class="btn btn-green">🤖 Submit & Auto-Classify with AI</button>
    </form>
  </div>
</div>
{% endblock %}
